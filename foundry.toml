[profile.default]
src = "src"
out = "out"
libs = ["lib"]

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options

script = "ignore_scripts"
test = "ignore_tests"

via_ir = true
optimizer = true          # usually already true, but good to have
optimizer_runs = 200